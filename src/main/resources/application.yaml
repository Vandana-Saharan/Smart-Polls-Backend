server:
  port: ${PORT:8080}

spring:
  application:
    name: smartpolls-api

  datasource:
    # Defaults for local dev (works with docker-compose in this repo).
    # Override via env vars when deploying.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartpolls}
    username: ${SPRING_DATASOURCE_USERNAME:smartpolls}
    password: ${SPRING_DATASOURCE_PASSWORD:smartpolls}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    # For local dev only. In production set JWT_SECRET env var.
    secret: ${JWT_SECRET:dev-only-change-me-to-a-long-secret}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  admin-usernames: ${ADMIN_USERNAMES:admin}
